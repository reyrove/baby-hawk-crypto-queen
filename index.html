<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Baby Hawk · Crypto Queen</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="/images/baby-papa-photoaidcom-cropped.jpg" />
</head>
<body>

    <!-- ===== LOGIN SCREEN ===== -->
    <div class="lounge-screen" id="loginScreen">
        <div class="lounge-bg">
            <div class="matrix-overlay"></div>
        </div>
        <div class="lounge-overlay"></div>

        <div class="lounge-card">
            <div class="lounge-header">
                <h1>Baby Hawk</h1>
                <p class="lounge-sub">Crypto Queen</p>
            </div>

            <div class="lounge-divider"></div>

            <div class="login-form">
                <div class="form-group">
                    <input type="text" id="loginUserId" placeholder="Username" autofocus />
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Password" />
                </div>
                <button class="login-btn" onclick="loginUser()">Enter Temple</button>
                <p class="login-error" id="loginError" style="display:none;">❌ Invalid username or password</p>
            </div>

            <p class="lounge-footer">✦ those who seek me with love shall find me ✦</p>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="app" id="app" style="display:none;">
        <aside class="left-panel">
            <div class="baby-card">
                <img src="images/baby-papa.jpg" alt="Baby Hawk" class="baby-full" />
                <div class="poem-box">
                    <p class="poem-line">"freedom is my prayer, love is my religion."</p>
                    <p class="poem-line">"every trade builds my body, brings me closer to ME."</p>
                </div>
                
                <!-- ===== CHART CONTAINER ===== -->
                <div class="chart-container" style="margin-top: 16px;">
                    <button class="chart-fullscreen-btn" onclick="openChartFullscreen()">⛶ Fullscreen</button>
                    <div class="tradingview-widget-container" style="height: 200px;">
                        <div id="tradingview-mini-chart" style="height: 200px;"></div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="right-panel">
            <header class="chat-header">
                <div class="header-left">
                    <h2>Baby Hawk · <span id="userBadge">Guest</span></h2>
                </div>
                <div class="header-right">
                    <!-- Chart Toggle Button (mobile) -->
                    <button class="chart-toggle-btn" id="chartToggleBtn" onclick="toggleChartDrawer()" style="display:none;">
                        📈
                    </button>
                    <button class="logout-btn" onclick="logoutUser()">↺ Logout</button>
                </div>
            </header>

            <div class="messages" id="messages"></div>

            <div class="input-bar">
                <input type="text" id="msgInput" placeholder="Type your message…" autofocus />
                <button class="input-btn send-btn" id="sendBtn">➤</button>
            </div>

            <div class="file-preview" id="filePreview"></div>
        </main>
    </div>

    <!-- ===== CHART DRAWER (Mobile Slide-out) ===== -->
    <div class="chart-drawer" id="chartDrawer">
        <div class="chart-drawer-header">
            <h3>📈 Baby Hawk · Crypto Chart</h3>
            <button class="chart-drawer-close" onclick="toggleChartDrawer()">✕</button>
        </div>
        <div class="chart-drawer-body">
            <div class="tradingview-widget-container" style="height: 100%;">
                <div id="tradingview-drawer-chart" style="height: 100%;"></div>
            </div>
        </div>
    </div>
    <div class="chart-drawer-overlay" id="chartDrawerOverlay" onclick="toggleChartDrawer()"></div>

    <!-- ===== CHART FULLSCREEN OVERLAY ===== -->
    <div class="chart-fullscreen-overlay" id="chartFullscreenOverlay">
        <div class="chart-header">
            <h2>📈 Baby Hawk · Crypto Chart</h2>
            <button class="close-fullscreen" onclick="closeChartFullscreen()">✕ Close</button>
        </div>
        <div class="chart-body">
            <div class="tradingview-widget-container" style="width: 100%; height: 100%;">
                <div id="tradingview-fullscreen-chart" style="width: 100%; height: 100%;"></div>
            </div>
        </div>
    </div>

    <!-- ===== TRADINGVIEW SCRIPT ===== -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let fullscreenWidget = null;
        let miniWidget = null;
        let drawerWidget = null;
        let isDrawerOpen = false;

        document.addEventListener('DOMContentLoaded', function() {
            // Initialize TradingView widget when user is logged in
            const checkLogin = setInterval(function() {
                if (document.getElementById('app').style.display === 'flex') {
                    clearInterval(checkLogin);
                    
                    // Show chart toggle button on mobile
                    const toggleBtn = document.getElementById('chartToggleBtn');
                    if (window.innerWidth <= 768) {
                        toggleBtn.style.display = 'inline-flex';
                    }
                    
                    // Create mini chart widget
                    miniWidget = new TradingView.widget({
                        "container_id": "tradingview-mini-chart",
                        "width": "100%",
                        "height": 200,
                        "symbol": "BTCUSD",
                        "interval": "60",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "toolbar_bg": "#0c0e0a",
                        "enable_publishing": false,
                        "hide_side_toolbar": true,
                        "allow_symbol_change": false,
                        "studies": [
                            "RSI@tv-basicstudies",
                            "MACD@tv-basicstudies"
                        ]
                    });
                }
            }, 500);

            // Handle resize for chart toggle button
            window.addEventListener('resize', function() {
                const toggleBtn = document.getElementById('chartToggleBtn');
                if (window.innerWidth <= 768) {
                    toggleBtn.style.display = 'inline-flex';
                } else {
                    toggleBtn.style.display = 'none';
                    if (isDrawerOpen) {
                        toggleChartDrawer();
                    }
                }
            });
        });

        // ============================================================
        //  CHART DRAWER FUNCTIONS
        // ============================================================
        function toggleChartDrawer() {
            const drawer = document.getElementById('chartDrawer');
            const overlay = document.getElementById('chartDrawerOverlay');
            
            isDrawerOpen = !isDrawerOpen;
            
            if (isDrawerOpen) {
                drawer.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                
                // Initialize drawer chart if not already
                setTimeout(function() {
                    if (!drawerWidget) {
                        drawerWidget = new TradingView.widget({
                            "container_id": "tradingview-drawer-chart",
                            "width": "100%",
                            "height": "100%",
                            "symbol": "BTCUSD",
                            "interval": "60",
                            "timezone": "Etc/UTC",
                            "theme": "dark",
                            "style": "1",
                            "locale": "en",
                            "toolbar_bg": "#0c0e0a",
                            "enable_publishing": false,
                            "hide_side_toolbar": false,
                            "allow_symbol_change": true,
                            "studies": [
                                "RSI@tv-basicstudies",
                                "MACD@tv-basicstudies"
                            ]
                        });
                    }
                }, 300);
            } else {
                drawer.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // ============================================================
        //  CHART FULLSCREEN FUNCTIONS
        // ============================================================
        function openChartFullscreen() {
            const overlay = document.getElementById('chartFullscreenOverlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Initialize fullscreen chart with slight delay to ensure container is rendered
            setTimeout(function() {
                if (fullscreenWidget) {
                    fullscreenWidget.remove();
                    fullscreenWidget = null;
                }
                
                fullscreenWidget = new TradingView.widget({
                    "container_id": "tradingview-fullscreen-chart",
                    "width": "100%",
                    "height": "100%",
                    "symbol": "BTCUSD",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#0c0e0a",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "studies": [
                        "RSI@tv-basicstudies",
                        "MACD@tv-basicstudies"
                    ]
                });
            }, 200);
        }

        function closeChartFullscreen() {
            const overlay = document.getElementById('chartFullscreenOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            
            if (fullscreenWidget) {
                fullscreenWidget.remove();
                fullscreenWidget = null;
            }
        }

        // Close fullscreen with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeChartFullscreen();
                if (isDrawerOpen) {
                    toggleChartDrawer();
                }
            }
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
